<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio · Drone π + Granulone</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Inter", "Segoe UI", sans-serif;
      background: #0a0c12;
      color: #ecf3ff;
      --accent: #5ad1ff;
      --accent-soft: rgba(90, 209, 255, 0.18);
      --panel: rgba(22, 26, 35, 0.88);
      --border: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
    }

    #studio-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.6rem;
      padding: 0.7rem 1.2rem;
      background: rgba(12, 15, 22, 0.96);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    #studio-bar .brand {
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(236, 243, 255, 0.55);
      margin-right: 0.6rem;
    }

    .tab-btn {
      border: 1px solid var(--border);
      background: transparent;
      color: rgba(236, 243, 255, 0.65);
      border-radius: 999px;
      padding: 0.5rem 1.3rem;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .tab-btn.active {
      background: var(--accent-soft);
      border-color: rgba(90, 209, 255, 0.4);
      color: var(--accent);
    }

    #studio-bar .spacer {
      flex: 1;
    }

    .studio-action {
      border: 1px solid var(--border);
      background: transparent;
      color: rgba(236, 243, 255, 0.7);
      border-radius: 999px;
      padding: 0.45rem 1rem;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
    }

    .studio-action:hover {
      color: var(--accent);
      border-color: rgba(90, 209, 255, 0.4);
    }

    #studio-status {
      font-size: 0.75rem;
      color: rgba(236, 243, 255, 0.55);
      letter-spacing: 0.04em;
      min-height: 1em;
    }

    #cascade-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 0.8rem;
      border: 1px solid rgba(90, 209, 255, 0.25);
      border-radius: 999px;
      background: rgba(90, 209, 255, 0.06);
    }

    #cascade-controls label {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(236, 243, 255, 0.6);
      white-space: nowrap;
    }

    #cascade-controls input[type="range"] {
      width: 90px;
      accent-color: var(--accent);
    }

    #cascade-controls output {
      font-size: 0.72rem;
      color: rgba(236, 243, 255, 0.7);
      min-width: 2.6em;
      font-variant-numeric: tabular-nums;
    }

    #cascadeRecBtn.recording {
      color: #ff5555;
      border-color: rgba(255, 85, 85, 0.6);
      background: rgba(255, 85, 85, 0.12);
    }

    #tour-popup {
      position: fixed;
      left: 50%;
      bottom: 1.2rem;
      transform: translateX(-50%);
      z-index: 300;
      width: min(440px, calc(100vw - 2rem));
      background: rgba(16, 20, 28, 0.97);
      border: 1px solid rgba(90, 209, 255, 0.35);
      border-radius: 14px;
      padding: 1rem 1.2rem;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.6);
    }

    #tour-popup .tour-step {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: rgba(236, 243, 255, 0.45);
    }

    #tour-popup h3 {
      margin: 0.25rem 0 0.45rem;
      font-size: 1rem;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    #tour-popup p {
      margin: 0 0 0.9rem;
      font-size: 0.88rem;
      line-height: 1.55;
      color: rgba(236, 243, 255, 0.85);
    }

    .tour-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .tour-actions button {
      border: 1px solid var(--border);
      background: transparent;
      color: rgba(236, 243, 255, 0.7);
      border-radius: 999px;
      padding: 0.45rem 1.1rem;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
    }

    .tour-actions button.primary {
      background: var(--accent-soft);
      border-color: rgba(90, 209, 255, 0.4);
      color: var(--accent);
    }

    .tour-highlight {
      outline: 2px solid var(--accent);
      outline-offset: 4px;
      border-radius: 8px;
      box-shadow: 0 0 18px rgba(90, 209, 255, 0.35);
    }

    #transport {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.3rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 999px;
    }

    #transport input {
      width: 3.4em;
      background: rgba(236, 243, 255, 0.08);
      border: 1px solid var(--border);
      color: #ecf3ff;
      border-radius: 6px;
      padding: 0.2rem 0.3rem;
      font-size: 0.8rem;
      text-align: center;
    }

    #transport .t-label {
      font-size: 0.7rem;
      color: rgba(236, 243, 255, 0.55);
      letter-spacing: 0.08em;
    }

    #clockPlayBtn.running {
      color: #7dd956;
      border-color: rgba(125, 217, 86, 0.5);
      background: rgba(125, 217, 86, 0.1);
    }

    .synth-section {
      width: min(1100px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.8rem;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
    }

    .synth-section h2 {
      margin: 0 0 0.5rem;
      font-size: 1.05rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(236, 243, 255, 0.8);
    }

    .synth-hint {
      margin: 0 0 1.2rem;
      font-size: 0.82rem;
      color: rgba(236, 243, 255, 0.55);
      line-height: 1.55;
      max-width: 720px;
    }

    .param-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem 1.4rem;
    }

    .param {
      display: grid;
      gap: 0.45rem;
    }

    .param label {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(236, 243, 255, 0.65);
    }

    .param input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .drum-voices {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.2rem;
    }

    .drum-voice {
      background: rgba(236, 243, 255, 0.04);
      border: 1px solid rgba(236, 243, 255, 0.08);
      border-radius: 14px;
      padding: 1rem;
      display: grid;
      gap: 0.8rem;
    }

    .drum-voice header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(236, 243, 255, 0.7);
    }

    .dv-mute {
      border: 1px solid rgba(236, 243, 255, 0.25);
      background: transparent;
      color: rgba(236, 243, 255, 0.55);
      border-radius: 6px;
      padding: 0.15rem 0.55rem;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
    }

    .dv-mute.active {
      background: #ff5555;
      border-color: #ff5555;
      color: #11141a;
      box-shadow: 0 0 8px rgba(255, 85, 85, 0.5);
    }

    #swarmCanvas {
      display: block;
      width: 100%;
      height: 190px;
      background: #0a1408;
      border-radius: 12px;
      border: 1px solid rgba(125, 217, 86, 0.18);
      cursor: crosshair;
      margin-bottom: 1rem;
    }

    .swarm-controls {
      display: flex;
      gap: 1.6rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .panic-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #6a3024 0%, #3a1810 100%);
      border: 1px solid #2a1008;
      cursor: pointer;
      color: transparent;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 100, 80, 0.2);
      transition: box-shadow 0.1s ease;
    }

    .panic-btn:active {
      box-shadow: 0 0 16px rgba(196, 76, 58, 0.7), inset 0 1px 4px rgba(0, 0, 0, 0.6);
    }

    .studio-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem 2.5rem;
      gap: 2rem;
    }

    .studio-panel[hidden] {
      display: none;
    }

    #studio-loading {
      padding: 3rem;
      text-align: center;
      color: rgba(236, 243, 255, 0.6);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.85rem;
    }

    /* Granulone base look inside its panel (its body/:root rules can't apply here) */
    #granulone-panel {
      align-items: stretch;
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <nav id="studio-bar">
    <span class="brand">Studio</span>
    <button class="tab-btn active" data-tab="drone-panel" type="button">Drone π</button>
    <button class="tab-btn" data-tab="granulone-panel" type="button">Granulone</button>
    <button class="tab-btn" data-tab="bass-panel" type="button">Basso</button>
    <button class="tab-btn" data-tab="drums-panel" type="button">Drums</button>
    <div id="transport" title="Clock condiviso di basso e batteria">
      <button id="clockPlayBtn" class="studio-action" type="button">&#9654;</button>
      <input type="number" id="bpmInput" min="40" max="220" value="110">
      <span class="t-label">BPM</span>
    </div>
    <span class="spacer"></span>
    <div id="cascade-controls" title="Registra il drone e riversalo come campione nel Granulone">
      <label for="cascadeAmount">Cascata</label>
      <input type="range" id="cascadeAmount" min="0" max="100" step="1" value="80">
      <output id="cascadeVal">80%</output>
      <button id="cascadeRecBtn" class="studio-action" type="button">&#9679; Riversa</button>
    </div>
    <span id="studio-status"></span>
    <button id="tourBtn" class="studio-action" type="button" title="Rivedi il tutorial">?</button>
    <button id="studioSaveBtn" class="studio-action" type="button" title="Esporta lo stato di entrambi i synth in un file">Export Studio</button>
    <label for="studioImportInput" class="studio-action" title="Importa un file di preset studio">Import Studio</label>
    <input type="file" id="studioImportInput" hidden>
  </nav>

  <div id="studio-loading">Caricamento synth…</div>
  <div id="drone-panel" class="studio-panel" hidden></div>
  <div id="granulone-panel" class="studio-panel" hidden></div>
  <div id="bass-panel" class="studio-panel" hidden></div>
  <div id="drums-panel" class="studio-panel" hidden></div>

  <script>
    // Opened by double-clicking the file: modules and fetch are blocked on
    // file://, so explain how to start instead of hanging on "Caricamento".
    if (location.protocol === "file:") {
      document.addEventListener("DOMContentLoaded", () => {
        const el = document.getElementById("studio-loading");
        if (el) {
          el.innerHTML =
            "Lo Studio non può partire aprendo il file direttamente.<br><br>" +
            "Chiudi questa pagina e fai doppio clic su <strong>“Avvia Studio.command”</strong> " +
            "nella cartella del progetto: avvia tutto da solo e apre il browser.";
          el.style.color = "#ffb86b";
          el.style.textTransform = "none";
          el.style.letterSpacing = "0.02em";
          el.style.lineHeight = "1.7";
        }
      });
    }
  </script>
  <script type="module" src="studio.js"></script>
</body>
</html>
